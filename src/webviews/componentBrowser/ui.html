<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline';">
  <title>Component Browser</title>
  <style>
    :root {
      --bg: #000000;
      --surface: #0a0a0a;
      --border: #222222;
      --border-hover: #444444;
      --text: #ffffff;
      --subtext: #888888;
      --accent: #ffffff;
      --accent-fg: #000000;
      --danger: #ff4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { 
      background: var(--bg); 
      color: var(--text); 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
      padding: 40px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      max-width: 800px;
      margin: 0 auto;
    }
    
    h1 { font-size: 24px; font-weight: 400; margin-bottom: 24px; color: var(--text); letter-spacing: -0.5px; }
    
    /* --- Tabs --- */
    .tabs { display: flex; gap: 24px; margin-bottom: 32px; border-bottom: 1px solid var(--border); }
    .tab { 
      padding: 0 0 12px 0; cursor: pointer; border-bottom: 2px solid transparent; 
      font-size: 14px; color: var(--subtext); transition: all 0.2s; 
    }
    .tab.active { color: var(--text); border-bottom-color: var(--text); }
    .tab:hover:not(.active) { color: var(--text); }

    /* --- Search --- */
    .search-row { display: flex; gap: 16px; margin-bottom: 32px; align-items: flex-end; }
    .search-input { 
      flex: 1; background: transparent; border: none; border-bottom: 1px solid var(--border); 
      padding: 8px 0; color: var(--text); font-size: 16px; outline: none; 
      transition: border-color 0.2s; 
    }
    .search-input:focus { border-color: var(--text); }
    .search-input::placeholder { color: #333; }
    
    .btn { 
      padding: 8px 16px; border: none; font-size: 13px; font-weight: 500; 
      cursor: pointer; transition: all 0.2s; 
    }
    .btn-search { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-search:hover { border-color: var(--text); }
    
    /* --- Results --- */
    .results { display: flex; flex-direction: column; gap: 1px; background: var(--border); border: 1px solid var(--border); }
    .result-card { 
      background: var(--bg); padding: 20px; display: flex; gap: 24px; align-items: flex-start; 
      transition: background 0.2s ease; 
    }
    .result-card:hover { background: #111111; }
    
    .result-info { flex: 1; }
    .result-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 8px; }
    .result-name { font-size: 15px; font-weight: 500; color: var(--text); }
    .result-version { font-size: 12px; color: var(--subtext); font-family: monospace; }
    .result-desc { font-size: 13px; color: var(--subtext); line-height: 1.5; }
    .result-meta { font-size: 12px; color: var(--subtext); margin-top: 12px; }
    
    .btn-add { 
      padding: 8px 16px; background: var(--accent); color: var(--accent-fg); 
      border: none; cursor: pointer; font-size: 13px; font-weight: 500; white-space: nowrap; 
      transition: opacity 0.2s; 
    }
    .btn-add:hover { opacity: 0.8; }
    
    /* --- States --- */
    .loading { text-align: center; padding: 60px; color: var(--subtext); font-size: 13px; }
    .spin { animation: spin 0.8s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .empty { text-align: center; padding: 60px; color: var(--subtext); font-size: 13px; }
    .empty .icon { display: none; } /* hide emoji icons */
    
    .panel { display: none; }
    .panel.active { display: block; }
  </style>
</head>
<body>
  <h1>Component Browser</h1>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('idf', this)">Espressif Registry</div>
    <div class="tab" onclick="switchTab('crates', this)">crates.io</div>
  </div>

  <div class="panel active" id="panel-idf">
    <div class="search-row">
      <input class="search-input" id="idf-search" placeholder="Search IDF components..." onkeydown="if(event.key==='Enter')searchIdf()">
      <button class="btn btn-search" onclick="searchIdf()">Search</button>
    </div>
    <div class="results" id="idf-results">
      <div class="empty"><p>Search for ESP-IDF components</p></div>
    </div>
  </div>

  <div class="panel" id="panel-crates">
    <div class="search-row">
      <input class="search-input" id="crates-search" placeholder="Search Rust crates..." onkeydown="if(event.key==='Enter')searchCrates()">
      <button class="btn btn-search" onclick="searchCrates()">Search</button>
    </div>
    <div class="results" id="crates-results">
      <div class="empty"><p>Search for ESP-compatible Rust crates</p></div>
    </div>
  </div>

  <script>
    const vscode = acquireVsCodeApi();

    function switchTab(tab, el) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('panel-' + tab).classList.add('active');
    }

    function searchIdf() {
      const q = document.getElementById('idf-search').value.trim();
      if (!q) return;
      document.getElementById('idf-results').innerHTML = '<div class="loading"><span class="spin">⟳</span></div>';
      vscode.postMessage({ command: 'search-idf', query: q });
    }

    function searchCrates() {
      const q = document.getElementById('crates-search').value.trim();
      document.getElementById('crates-results').innerHTML = '<div class="loading"><span class="spin">⟳</span></div>';
      vscode.postMessage({ command: 'search-crates', query: q || 'esp32' });
    }

    function renderIdfResults(results) {
      if (!results.length) {
        document.getElementById('idf-results').innerHTML = '<div class="empty"><p>No components found</p></div>';
        return;
      }
      document.getElementById('idf-results').innerHTML = results.map(r => `
        <div class="result-card">
          <div class="result-info">
            <div class="result-header"><span class="result-name">${r.name}</span><span class="result-version">${r.version || 'latest'}</span></div>
            <div class="result-desc">${r.description || 'No description'}</div>
          </div>
          <button class="btn-add" onclick="addToIdf('${r.name}', '${r.version || '*'}')">Add to idf_component.yml</button>
        </div>
      `).join('');
    }

    function renderCratesResults(results) {
      if (!results.length) {
        document.getElementById('crates-results').innerHTML = '<div class="empty"><p>No crates found</p></div>';
        return;
      }
      document.getElementById('crates-results').innerHTML = results.map(r => `
        <div class="result-card">
          <div class="result-info">
            <div class="result-header"><span class="result-name">${r.name}</span><span class="result-version">${r.newest_version}</span></div>
            <div class="result-desc">${r.description || 'No description'}</div>
            <div class="result-meta"><span>${(r.downloads||0).toLocaleString()} downloads</span></div>
          </div>
          <button class="btn-add" onclick="addToCargo('${r.name}', '${r.newest_version}')">Add to Cargo.toml</button>
        </div>
      `).join('');
    }

    function addToIdf(name, version) { vscode.postMessage({ command: 'add-to-idf', name, version }); }
    function addToCargo(name, version) { vscode.postMessage({ command: 'add-to-cargo', name, version }); }

    window.addEventListener('message', event => {
      const msg = event.data;
      switch (msg.command) {
        case 'idf-results': renderIdfResults(msg.results); break;
        case 'crates-results': renderCratesResults(msg.results); break;
        case 'idf-error': document.getElementById('idf-results').innerHTML = '<div class="empty"><p style="color:var(--danger)">Error: ' + msg.message + '</p></div>'; break;
        case 'crates-error': document.getElementById('crates-results').innerHTML = '<div class="empty"><p style="color:var(--danger)">Error: ' + msg.message + '</p></div>'; break;
        case 'added': vscode.postMessage({ command: 'show-info', message: msg.name + ' added!' }); break;
      }
    });

    // Auto-search popular ESP crates on open
    searchCrates();
  </script>
</body>
</html>
